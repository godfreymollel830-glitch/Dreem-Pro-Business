// ── MINI BAR CHART ──
const MiniBar=({data,color=C.primary,h=80})=>{
  const max=Math.max(...data.map(d=>d.v),1);
  return<div style={{display:"flex",alignItems:"flex-end",gap:3,height:h}}>
    {data.map((d,i)=>(
      <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
        <div style={{width:"100%",background:color,borderRadius:"4px 4px 0 0",
          height:`${(d.v/max)*h*0.85}px`,minHeight:2,transition:"height .5s"}}/>
        <span style={{fontSize:9,color:C.muted,transform:"rotate(-30deg)",whiteSpace:"nowrap"}}>{d.l}</span>
      </div>
    ))}
  </div>
};
const MiniLine=({data,color=C.primary,h=80})=>{
  const max=Math.max(...data.map(d=>d.v),1);
  const pts=data.map((d,i)=>`${(i/(data.length-1))*200},${h-(d.v/max)*(h-10)}`).join(" ");
  return<svg width="100%" viewBox={`0 0 200 ${h}`} preserveAspectRatio="none" style={{height:h}}>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    <polyline points={`0,${h} ${pts} 200,${h}`} fill={color+"25"} stroke="none"/>
  </svg>
};
const MiniPie=({data,r=50})=>{
  let angle=0;
  const total=data.reduce((a,b)=>a+b.v,0)||1;
  const slices=data.map((d,i)=>{
    const pct=d.v/total,a=pct*2*Math.PI;
    const x1=r+r*Math.sin(angle),y1=r-r*Math.cos(angle);
    angle+=a;
    const x2=r+r*Math.sin(angle),y2=r-r*Math.cos(angle);
    const large=pct>.5?1:0;
    return<path key={i} d={`M${r},${r} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`}
      fill={C.chart[i%C.chart.length]}/>;
  });
  return<svg width={r*2} height={r*2}>{slices}</svg>
};

const Dashboard=({prods,sales,exps,notifs,t})=>{

  const tex=exps.reduce((a,b)=>a+b.amount,0);

    return{l:dayLabel(d.toISOString()),v:rv};

    {v:sales.filter(s=>s.pay==="cash").reduce((a,b)=>a+b.amount,0)},
    {v:sales.filter(s=>s.pay==="mobile").reduce((a,b)=>a+b.amount,0)},

        {l:t.rev,v:fmtC(rev),icon:"💰",c:C.primary,tr:"+12%"},
        {l:t.tex,v:fmtC(tex),icon:"📤",c:C.yellow,tr:"-5%"},
        {l:t.profit,v:fmtC(profit),icon:"📈",c:profit>=0?C.accent:C.red,tr:profit>=0?"+8%":"-8%"},
        {l:t.prods,v:prods.length,icon:"📦",c:C.blue,sub:`${outStock.length} out of stock`},

          <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6}}>{s.l}</div>
          <div style={{fontSize:22,fontWeight:900,color:s.c,lineHeight:1.2}}>{s.v}</div>
          {s.tr&&<div style={{fontSize:11,color:s.c,marginTop:4,fontWeight:700}}>{s.tr} vs last period</div>}
          {s.sub&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>{s.sub}</div>}
        </Card>
      ))}
    </div>

    {/* Alerts */}
    {lowStock.length>0&&<div style={{background:"#fef3c7",border:`1px solid ${C.yellow}`,borderRadius:12,
      padding:"12px 16px",marginBottom:14,display:"flex",gap:10,alignItems:"center"}}>

      <div><strong style={{color:"#92400e"}}>{t.low}:</strong>
        <span style={{color:"#92400e",fontSize:13,marginLeft:6}}>
          {lowStock.map(p=>`${p.name} (${p.qty} ${t.units})`).join(" • ")}
        </span>
      </div>
    </div>}
    {profit<0&&<div style={{background:"#fef2f2",border:`1px solid ${C.red}`,borderRadius:12,
      padding:"12px 16px",marginBottom:14,display:"flex",gap:10,alignItems:"center"}}>
      <span style={{fontSize:20}}>🚨</span>
      <strong style={{color:C.red}}>{t.loss}: {fmtC(Math.abs(profit))} loss this period!</strong>
    </div>}

    {/* Charts Row */}
    <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:16}}>
      <Card style={{flex:2,minWidth:280}}>
        <h3 style={{margin:"0 0 14px",color:C.dark,fontSize:15}}>📊 Revenue (Last 7 Days)</h3>
        <MiniBar data={last7} color={C.primary} h={100}/>
      </Card>
      <Card style={{flex:1,minWidth:200}}>

    {/* Bottom Row */}

      <Card style={{flex:1,minWidth:220}}>

            <span style={{fontSize:12,color:col,fontWeight:700}}>~{dl} {t.days}</span>
          </div>

      </Card>

      <Card style={{flex:1,minWidth:220}}>
        <h3 style={{margin:"0 0 14px",color:C.dark,fontSize:15}}>🔔 Recent Alerts</h3>
        {notifs.slice(0,5).map(n=>(

  const openEdit=p=>{setEd(p);setForm({name:p.name,buy:p.buy,sell:p.sell,qty:p.qty,cat:p.cat,expiry:p.expiry||""});setShowM(true)};
  const save=()=>{
    if(!form.name||!form.sell)return;
    const prod={name:form.name,buy:+form.buy,sell:+form.sell,qty:+form.qty,cat:form.cat,expiry:form.expiry||null,sold:ed?.sold||0};
    if(ed)setProds(p=>p.map(x=>x.id===ed.id?{...prod,id:x.id}:x));
    else{
      setProds(p=>[...p,{...prod,id:Date.now()}]);
      if(+form.qty<=5)addNotif({icon:"⚠️",msg:`${form.name} — only ${form.qty} ${t.units} added`,type:"warning"});
    }
    setShowM(false);
  };
  const delP=id=>{setProds(p=>p.filter(x=>x.id!==id));setDel(null)};

  const stockStatus=p=>{
    if(p.qty===0)return{l:t.out,c:C.red};
    if(p.qty<=5)return{l:t.low,c:C.yellow};
    return{l:t.instock,c:C.accent};
  };
  const expiryStatus=d=>{
    const days=expiryDays(d);
    if(days===null)return null;
    if(days<0)return{l:"Expired",c:C.red};
    if(days<=30)return{l:`${days}d`,c:C.yellow};
    return{l:`${days}d`,c:C.accent};
  };

  return<div className="page">
    <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={`🔍 ${t.search}...`}

    {/* Summary */}
    <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
      {[
        {l:"Total",v:prods.length,c:C.blue},
        {l:"In Stock",v:prods.filter(p=>p.qty>0).length,c:C.accent},
        {l:"Low Stock",v:prods.filter(p=>p.qty>0&&p.qty<=5).length,c:C.yellow},
        {l:"Out of Stock",v:prods.filter(p=>p.qty===0).length,c:C.red},
      ].map(s=>(
        <div key={s.l} style={{flex:1,minWidth:100,background:s.c+"12",border:`1px solid ${s.c}30`,
          borderRadius:12,padding:"10px 14px",textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.v}</div>
          <div style={{fontSize:11,color:C.muted,fontWeight:700}}>{s.l}</div>
        </div>
      ))}
    </div>

    <Card style={{padding:0,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table>
          <thead>
            <tr style={{background:C.dark}}>
              {[t.pname,t.cat,t.buy,t.sell,t.qty,t.expiry,"Status",""].map(h=>(
                <th key={h} style={{padding:"12px 14px",textAlign:"left",color:"#fff",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filt.map((p,i)=>{
              const st=stockStatus(p);
              const ex=expiryStatus(p.expiry);
              return<tr key={p.id} style={{background:i%2===0?C.bg:"#fff",borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:"11px 14px",fontWeight:700}}>{p.name}</td>
                <td style={{padding:"11px 14px"}}><Badge>{p.cat}</Badge></td>
                <td style={{padding:"11px 14px",fontSize:13}}>{fmtC(p.buy)}</td>
                <td style={{padding:"11px 14px",fontWeight:700,color:C.primary}}>{fmtC(p.sell)}</td>
                <td style={{padding:"11px 14px",textAlign:"center",fontWeight:900,color:p.qty<=5?C.red:C.text}}>{p.qty}</td>
                <td style={{padding:"11px 14px"}}>{ex?<Badge color={ex.c}>{ex.l}</Badge>:<span style={{color:C.muted}}>—</span>}</td>
                <td style={{padding:"11px 14px"}}><Badge color={st.c}>{st.l}</Badge></td>
                <td style={{padding:"11px 14px"}}>
                  <div style={{display:"flex",gap:5}}>
                    <Btn s="sm" v="ghost" onClick={()=>openEdit(p)}>✏️</Btn>
                    <Btn s="sm" v="danger" onClick={()=>setDel(p)}>🗑️</Btn>
                  </div>
                </td>
              </tr>
            })}
            {filt.length===0&&<tr><td colSpan={8} style={{padding:40,textAlign:"center",color:C.muted}}>{t.nodata}</td></tr>}
          </tbody>
        </table>
      </div>
    </Card>

    <Modal show={showM} onClose={()=>setShowM(false)} title={ed?t.editProd:t.addProd}>
      <Inp label={t.pname} value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} req/>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label={t.buy} value={form.buy} onChange={v=>setForm(f=>({...f,buy:v}))} type="number"/></div>
        <div style={{flex:1}}><Inp label={t.sell} value={form.sell} onChange={v=>setForm(f=>({...f,sell:v}))} type="number" req/></div>
      </div>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label={t.qty} value={form.qty} onChange={v=>setForm(f=>({...f,qty:v}))} type="number"/></div>
        <div style={{flex:1}}><Sel label={t.cat} value={form.cat} onChange={v=>setForm(f=>({...f,cat:v}))} opts={cats.map(c=>({v:c,l:c}))}/></div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn v="ghost" onClick={()=>setShowM(false)}>{t.cancel}</Btn>

    <Modal show={!!del} onClose={()=>setDel(null)} title={t.del} w={360}>

  const [budget,setBudget]=useState(500000);

  const mStr=new Date().toISOString().slice(0,7);
  const monthExps=exps.filter(e=>e.date.startsWith(mStr));
  const monthTotal=monthExps.reduce((a,b)=>a+b.amount,0);
  const pct=Math.min(100,(monthTotal/budget)*100);

  const byCat=exps.reduce((acc,e)=>{acc[e.cat]=(acc[e.cat]||0)+e.amount;return acc},{});
  const pieData=Object.entries(byCat).map(([k,v])=>({name:k,v}));

              borderRadius:10,transition:"width .5s"}}/>

                <strong style={{marginLeft:"auto",paddingLeft:12}}>{fmtC(p.v)}</strong>

      <Card style={{flex:2,minWidth:280,padding:0,overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`}}>

        </div>
        <div style={{overflowX:"auto"}}>

            <thead>
              <tr style={{background:C.bg}}>

// ── REPORTS ──
const Reports=({sales,exps,prods,t})=>{
  const [period,setPeriod]=useState("weekly");
  const days=period==="daily"?1:period==="weekly"?7:30;
  const from=new Date(Date.now()-days*86400000);
  const fSales=sales.filter(s=>new Date(s.date)>=from);
  const fExps=exps.filter(e=>new Date(e.date)>=from);
  const rev=fSales.reduce((a,b)=>a+b.amount,0);
  const tex=fExps.reduce((a,b)=>a+b.amount,0);
  const profit=rev-tex;
  const margin=rev>0?((profit/rev)*100).toFixed(1):0;

  const chartDays=Math.min(days,10);
  const chartData=Array.from({length:chartDays},(_,i)=>{
    const d=new Date(Date.now()-(chartDays-1-i)*Math.ceil(days/chartDays)*86400000);
    const ds=d.toISOString().split("T")[0];
    return{l:dayLabel(d.toISOString()),v:sales.filter(s=>s.date.startsWith(ds)).reduce((a,b)=>a+b.amount,0)};
  });

  const topProds=Object.entries(fSales.reduce((acc,s)=>{acc[s.pname]=(acc[s.pname]||0)+s.amount;return acc},{}))
    .sort((a,b)=>b[1]-a[1]).slice(0,5);

  return<div className="page">
    <div style={{display:"flex",gap:10,marginBottom:20}}>
      {["daily","weekly","monthly"].map(p=>(
        <Btn key={p} v={period===p?"primary":"ghost"} onClick={()=>setPeriod(p)}>
          {p==="daily"?t.daily:p==="weekly"?t.weekly:t.monthly}
        </Btn>
      ))}
    </div>

    <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:20}}>
      {[
        {l:t.rev,v:fmtC(rev),c:C.primary,icon:"💰"},
        {l:t.tex,v:fmtC(tex),c:C.yellow,icon:"📤"},
        {l:t.profit,v:fmtC(profit),c:profit>=0?C.accent:C.red,icon:"📊"},
        {l:"Profit Margin",v:`${margin}%`,c:C.blue,icon:"📈"},
        {l:"Transactions",v:fSales.length,c:C.purple,icon:"🧾"},
      ].map(s=>(
        <Card key={s.l} style={{flex:1,minWidth:120,textAlign:"center"}}>
          <div style={{fontSize:28}}>{s.icon}</div>
          <div style={{fontSize:18,fontWeight:900,color:s.c,margin:"6px 0 2px"}}>{s.v}</div>
          <div style={{fontSize:11,color:C.muted,fontWeight:700}}>{s.l}</div>
        </Card>
      ))}
    </div>

    <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:16}}>
      <Card style={{flex:2,minWidth:280}}>
        <h3 style={{margin:"0 0 16px",color:C.dark,fontSize:15}}>📊 Revenue Trend</h3>
        <MiniBar data={chartData} color={C.primary} h={120}/>
      </Card>
      <Card style={{flex:1,minWidth:220}}>
        <h3 style={{margin:"0 0 14px",color:C.dark,fontSize:15}}>🏆 {t.top}</h3>
        {topProds.map(([name,val],i)=>(
          <div key={name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:13,fontWeight:700}}>{name}</span>
              <span style={{fontSize:12,color:C.primary,fontWeight:700}}>{fmtC(val)}</span>
            </div>
            <div style={{height:5,background:C.border,borderRadius:4}}>
              <div style={{height:5,background:C.chart[i],borderRadius:4,
                width:`${(val/topProds[0][1])*100}%`}}/>
            </div>
          </div>
        ))}
        {topProds.length===0&&<p style={{color:C.muted,fontSize:13}}>{t.nodata}</p>}
      </Card>
    </div>

    {profit<0&&<Card style={{background:"#fef2f2",border:`2px solid ${C.red}`}}>
      <h3 style={{color:C.red,margin:"0 0 8px"}}>🚨 {t.loss}</h3>
      <p style={{margin:0,color:"#7f1d1d",fontSize:14}}>
        This {period} shows a loss of <strong>{fmtC(Math.abs(profit))}</strong>.
        Revenue ({fmtC(rev)}) is lower than expenses ({fmtC(tex)}). 
        Consider reducing costs or increasing sales.
      </p>
    </Card>}
  </div>
};

// ── NOTIFICATIONS ──
const Notifs=({notifs,setNotifs,t})=>{
  const typeCol=tp=>({warning:C.yellow,danger:C.red,success:C.accent,info:C.blue}[tp]||C.primary);
  return<div className="page">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:13,color:C.muted}}>{notifs.filter(n=>!n.read).length} unread</div>
      <div style={{display:"flex",gap:8}}>
        <Btn v="ghost" s="sm" onClick={()=>setNotifs(p=>p.map(n=>({...n,read:true})))}>{t.mark}</Btn>
        <Btn v="danger" s="sm" onClick={()=>setNotifs([])}>{t.clear}</Btn>
      </div>
    </div>
    {notifs.length===0&&<Card style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:48,marginBottom:12}}>🔕</div>
      <div style={{color:C.muted}}>No notifications</div>
    </Card>}
    {notifs.map(n=>(
      <Card key={n.id} style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:10,
        borderLeft:`4px solid ${typeCol(n.type)}`,background:n.read?"#fff":typeCol(n.type)+"08"}}>
        <span style={{fontSize:24,flexShrink:0}}>{n.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:n.read?400:700,fontSize:14}}>{n.msg}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>{new Date(n.date).toLocaleString()}</div>
        </div>
        {!n.read&&<Badge color={typeCol(n.type)}>New</Badge>}
        <button onClick={()=>setNotifs(p=>p.map(x=>x.id===n.id?{...x,read:true}:x))}
          style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:20}}>✓</button>
      </Card>
    ))}
  </div>
};

// ── USERS ──
const UsersPage=({users,setUsers,user,t})=>{
  const [showM,setShowM]=useState(false);
  const [form,setForm]=useState({name:"",email:"",password:"",role:"staff",phone:""});
  const add=()=>{
    if(!form.name||!form.email)return;
    setUsers(p=>[...p,{id:Date.now(),...form,active:true,lastLogin:null}]);
    setShowM(false);setForm({name:"",email:"",password:"",role:"staff",phone:""});
  };
  const roleCol={admin:C.red,manager:C.blue,staff:C.primary};
  return<div className="page">
    {user.role==="admin"&&<div style={{marginBottom:16,display:"flex",justifyContent:"flex-end"}}>
      <Btn onClick={()=>setShowM(true)}>+ {t.addUser}</Btn>
    </div>}
    <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
      {users.map(u=>(
        <Card key={u.id} style={{flex:1,minWidth:240}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <div style={{width:48,height:48,borderRadius:16,background:roleCol[u.role]+"20",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>
              {u.role==="admin"?"👑":u.role==="manager"?"📊":"👤"}
            </div>
            <Badge color={u.active?C.accent:C.muted}>{u.active?"Active":"Inactive"}</Badge>
          </div>
          <div style={{fontWeight:900,fontSize:16,color:C.dark,marginBottom:4}}>{u.name}</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:8}}>{u.email}</div>
          <Badge color={roleCol[u.role]}>{u.role.toUpperCase()}</Badge>
          {u.phone&&<div style={{fontSize:12,color:C.muted,marginTop:8}}>📞 {u.phone}</div>}
          {user.role==="admin"&&u.id!==user.id&&(
            <div style={{marginTop:10}}>
              <Btn s="sm" v="ghost" onClick={()=>setUsers(p=>p.map(x=>x.id===u.id?{...x,active:!x.active}:x))}>
                {u.active?"Disable":"Enable"}
              </Btn>
            </div>
          )}
        </Card>
      ))}
    </div>
    <Modal show={showM} onClose={()=>setShowM(false)} title={t.addUser}>
      <Inp label={t.name} value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} req/>
      <Inp label={t.email} value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} type="email" req/>
      <Inp label="Password" value={form.password} onChange={v=>setForm(f=>({...f,password:v}))} type="password"/>
      <Inp label="Phone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/>
      <Sel label={t.role} value={form.role} onChange={v=>setForm(f=>({...f,role:v}))}
        opts={["admin","manager","staff"].map(r=>({v:r,l:r.charAt(0).toUpperCase()+r.slice(1)}))}/>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn v="ghost" onClick={()=>setShowM(false)}>{t.cancel}</Btn>
        <Btn onClick={add}>{t.save}</Btn>
      </div>
    </Modal>
  </div>
};

// ── MAIN APP ──
function App(){
  const [lang,setLang]=useState("en");
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dash");
  const [sidebar,setSidebar]=useState(true);
  const [prods,setProds]=useState(PRODS);
  const [sales,setSales]=useState(SALES);
  const [exps,setExps]=useState(EXPS);
  const [users,setUsers]=useState(USERS);
  const [toast,setToast]=useState(null);
  const [notifs,setNotifs]=useState([
    {id:1,icon:"⚠️",msg:"Sukari 1kg — only 3 units remaining",type:"warning",date:new Date().toISOString(),read:false},
    {id:2,icon:"🚨",msg:"Mafuta ya Kupikia is out of stock!",type:"danger",date:new Date(Date.now()-3600000).toISOString(),read:false},
    {id:3,icon:"📈",msg:"Sales target reached this week!",type:"success",date:new Date(Date.now()-7200000).toISOString(),read:true},
  ]);
  const t=T[lang];

  const showToast=useCallback((msg,type="success")=>{
    setToast({msg,type});setTimeout(()=>setToast(null),3500);
  },[]);

  const addNotif=useCallback(n=>{
    setNotifs(p=>[{id:Date.now(),...n,date:new Date().toISOString(),read:false},...p]);
    showToast(n.msg,n.type);
  },[showToast]);

  const login=u=>{setUser(u);showToast(`${t.welcome}, ${u.name}! 🌿`,"success")};
  const logout=()=>{setUser(null);setPage("dash")};
  const unread=notifs.filter(n=>!n.read).length;

  const nav=[
    {id:"dash",icon:"🏠",l:t.dash},
    {id:"inv",icon:"📦",l:t.inv},
    {id:"sales",icon:"💳",l:t.sales},
    {id:"exp",icon:"📤",l:t.exp},
    {id:"rep",icon:"📊",l:t.rep},
    {id:"notif",icon:"🔔",l:t.notif,badge:unread},
    ...(user?.role==="admin"?[{id:"users",icon:"👥",l:t.users}]:[]),
  ];

  if(!user)return<Login onLogin={login} lang={lang} setLang={setLang}/>;

  return<div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
    {/* Sidebar */}
    <div style={{width:sidebar?240:64,flexShrink:0,background:C.dark,
      transition:"width .25s",overflow:"hidden",display:"flex",flexDirection:"column",
      boxShadow:"4px 0 20px rgba(0,0,0,.15)"}}>
      <div style={{padding:"20px 16px",borderBottom:"1px solid rgba(255,255,255,.1)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:28,flexShrink:0}}>🌿</span>
          {sidebar&&<div>
            <div style={{color:"#fff",fontWeight:900,fontSize:14,lineHeight:1.2}}>{t.app}</div>
            <div style={{color:"#86efac",fontSize:10,fontWeight:700}}>{t.tag}</div>
          </div>}
        </div>
      </div>
      <nav style={{flex:1,padding:"12px 8px",overflowY:"auto"}}>
        {nav.map(item=>(
          <button key={item.id} onClick={()=>setPage(item.id)} style={{
            display:"flex",alignItems:"center",gap:12,width:"100%",
            padding:"11px 12px",borderRadius:12,border:"none",cursor:"pointer",
            background:page===item.id?"rgba(255,255,255,.15)":"transparent",
            color:page===item.id?"#fff":"#86efac",
            fontWeight:page===item.id?700:400,fontSize:14,transition:"all .15s",
            marginBottom:2,whiteSpace:"nowrap",fontFamily:"inherit"
          }}>
            <span style={{fontSize:18,flexShrink:0}}>{item.icon}</span>
            {sidebar&&<span>{item.l}</span>}
            {item.badge>0&&<span style={{marginLeft:"auto",background:C.red,color:"#fff",
              borderRadius:20,padding:"1px 7px",fontSize:11,fontWeight:900,flexShrink:0}}>{item.badge}</span>}
          </button>
        ))}
      </nav>
      <div style={{padding:"12px 8px",borderTop:"1px solid rgba(255,255,255,.1)"}}>
        {sidebar&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",
          marginBottom:8,background:"rgba(255,255,255,.06)",borderRadius:10}}>
          <span style={{fontSize:20}}>{user.role==="admin"?"👑":user.role==="manager"?"📊":"👤"}</span>
          <div>
            <div style={{color:"#fff",fontWeight:700,fontSize:13}}>{user.name}</div>
            <div style={{color:"#86efac",fontSize:10,textTransform:"uppercase"}}>{user.role}</div>
          </div>
        </div>}
        <div style={{display:"flex",gap:5,marginBottom:6,flexDirection:sidebar?"row":"column"}}>
          {["en","sw"].map(l=>(
            <button key={l} onClick={()=>setLang(l)} style={{flex:1,padding:"5px 4px",borderRadius:8,border:"none",
              background:lang===l?C.accent:"rgba(255,255,255,.08)",
              color:lang===l?C.dark:"#86efac",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
              {l.toUpperCase()}
            </button>
          ))}
        </div>
        <button onClick={logout} style={{display:"flex",alignItems:"center",gap:8,width:"100%",
          padding:"10px 12px",borderRadius:10,border:"none",cursor:"pointer",
          background:"transparent",color:"#f87171",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>
          <span>🚪</span>{sidebar&&t.logout}
        </button>
      </div>
    </div>

    {/* Main */}
    <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
      {/* Topbar */}
      <div style={{background:"#fff",padding:"14px 24px",borderBottom:`1px solid ${C.border}`,
        display:"flex",alignItems:"center",gap:16,position:"sticky",top:0,zIndex:100,
        boxShadow:"0 2px 8px rgba(0,0,0,.05)"}}>
        <button onClick={()=>setSidebar(o=>!o)} style={{background:"none",border:"none",
          fontSize:22,cursor:"pointer",color:C.primary,padding:4}}>☰</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:18,color:C.dark}}>
            {nav.find(n=>n.id===page)?.icon} {nav.find(n=>n.id===page)?.l}
          </div>
          <div style={{fontSize:12,color:C.muted}}>{new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
        </div>
        <button onClick={()=>setPage("notif")} style={{position:"relative",background:"none",border:"none",fontSize:22,cursor:"pointer"}}>
          🔔
          {unread>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.red,color:"#fff",
            borderRadius:20,width:18,height:18,fontSize:10,fontWeight:900,
            display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
        </button>
      </div>

      {/* Content */}
      <div style={{flex:1,padding:24,overflowY:"auto"}}>
        {page==="dash"&&<Dashboard prods={prods} sales={sales} exps={exps} notifs={notifs} t={t}/>}
        {page==="inv"&&<Inventory prods={prods} setProds={setProds} addNotif={addNotif} t={t}/>}
        {page==="sales"&&<Sales sales={sales} setSales={setSales} prods={prods} setProds={setProds} addNotif={addNotif} user={user} t={t}/>}
        {page==="exp"&&<Expenses exps={exps} setExps={setExps} addNotif={addNotif} t={t}/>}
        {page==="rep"&&<Reports sales={sales} exps={exps} prods={prods} t={t}/>}
        {page==="notif"&&<Notifs notifs={notifs} setNotifs={setNotifs} t={t}/>}
        {page==="users"&&<UsersPage users={users} setUsers={setUsers} user={user} t={t}/>}
      </div>
    </div>

    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
